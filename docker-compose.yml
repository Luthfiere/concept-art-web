services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/concept-art
      JWT_SECRET: secret
      PORT: 5000
      NODE_ENV: development

  seeder:
    build: ./backend
    command: node db/seeds/run-seed.js
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/concept-art
    restart: "no"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_RECAPTCHA_SITE_KEY: 6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
    ports:
      - "3001:3000"
    depends_on:
      - backend

  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: concept-art
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db/setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10